name: Bug report
description: Report a reproducible defect that is not a security vulnerability.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not disclose vulnerabilities here. Use the private process in SECURITY.md.
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include steps, expected behavior, and actual behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Scorecard Radar version
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux, Other]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or sample data
      description: Remove tokens, private paths, repository secrets, and confidential reports.
