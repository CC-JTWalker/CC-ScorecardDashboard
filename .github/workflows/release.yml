name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out signed tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Install exact direct dependencies
        run: npm ci --no-fund
      - name: Run tests
        run: npm run test:all
      - name: Build installers
        run: npm run dist
      - name: Upload installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
            dist/*.exe

  publish:
    name: Attest and publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download installers with digest verification
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: release-assets
          pattern: installers-*
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Generate signed build provenance
        id: provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/*
      - name: Add Sigstore bundle to release assets
        env:
          BUNDLE_PATH: ${{ steps.provenance.outputs.bundle-path }}
        run: cp "$BUNDLE_PATH" "release-assets/Scorecard-Radar-${GITHUB_REF_NAME}.sigstore.json"
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --generate-notes --title "Scorecard Radar $GITHUB_REF_NAME"
